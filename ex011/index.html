<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0                
    ">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p> Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>
    
    <picture>
        <source media="(max-width:750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1000px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexivel">
    </picture>

<h1> Reprodução Áudio</h1>
<p>vamos aprender a reproduzir áudios em HTML5</p>
<audio preload="metadata" autoplay controls loop>
    <source src="midias/shakira.m4a" type="audio/m4a"
    </audio>

    <p>infelizmente o seu navegador não consegue reproduzir áudio. <a href="midias/shakira.m4a">Clique aqui para baixar o arquivo</p>


</body>
</html>
